<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      color: #333;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 14px;
      font-weight: 600;
    }
    .section {
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      height: 200px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 11px;
      resize: vertical;
    }
    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      flex: 1;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .primary {
      background-color: #18A0FB;
      color: white;
    }
    .primary:hover {
      background-color: #1590E8;
    }
    .secondary {
      background-color: #F0F0F0;
      color: #333;
    }
    .secondary:hover {
      background-color: #E0E0E0;
    }
    .status {
      padding: 12px;
      border-radius: 4px;
      margin-top: 12px;
      display: none;
      font-size: 11px;
    }
    .status.success {
      background-color: #E8F5E9;
      border: 1px solid #4CAF50;
      color: #2E7D32;
      display: block;
    }
    .status.error {
      background-color: #FFEBEE;
      border: 1px solid #F44336;
      color: #C62828;
      display: block;
    }
    .instructions {
      background-color: #F5F5F5;
      padding: 12px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .instructions code {
      background-color: #E0E0E0;
      padding: 2px 4px;
      border-radius: 2px;
      font-family: 'Monaco', monospace;
    }
    .layer-list {
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      font-size: 11px;
      font-family: 'Monaco', monospace;
      background-color: #FAFAFA;
      display: none;
    }
    .layer-list.show {
      display: block;
    }
    .layer-item {
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }
    .layer-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <h2>🎬 Ad Script Importer</h2>

  <div class="instructions">
    <strong>How to use:</strong><br>
    1. Generate scripts using <code>write_scripts_to_figma.py</code><br>
    2. Copy contents of <code>figma_import.json</code><br>
    3. Paste JSON below and click "Import Scripts"<br>
    4. Text layers named <code>Script_1</code>, <code>Script_2</code>, etc. will be updated
  </div>

  <div class="section">
    <label for="jsonInput"><strong>Paste JSON from figma_import.json:</strong></label>
    <textarea id="jsonInput" placeholder='{"version": "1.0", "scripts": [...]}'></textarea>
  </div>

  <div class="button-group">
    <button class="primary" id="importBtn">Import Scripts</button>
    <button class="secondary" id="listLayersBtn">List Text Layers</button>
  </div>

  <div id="layerList" class="layer-list"></div>
  <div id="status" class="status"></div>

  <script>
    const jsonInput = document.getElementById('jsonInput');
    const importBtn = document.getElementById('importBtn');
    const listLayersBtn = document.getElementById('listLayersBtn');
    const status = document.getElementById('status');
    const layerList = document.getElementById('layerList');

    // Import scripts
    importBtn.onclick = () => {
      try {
        const data = JSON.parse(jsonInput.value);

        if (!data.scripts || !Array.isArray(data.scripts)) {
          showError('Invalid JSON format. Expected {scripts: [...]}');
          return;
        }

        showStatus('Importing scripts...', 'success');
        parent.postMessage({
          pluginMessage: {
            type: 'import-scripts',
            scripts: data.scripts
          }
        }, '*');

      } catch (err) {
        showError('Invalid JSON: ' + err.message);
      }
    };

    // List text layers
    listLayersBtn.onclick = () => {
      parent.postMessage({
        pluginMessage: { type: 'list-text-layers' }
      }, '*');
    };

    // Handle messages from plugin code
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;

      if (msg.type === 'import-complete') {
        const successMsg = `✅ Success: ${msg.success} scripts imported`;
        const errorMsg = msg.errors > 0 ? `\n⚠️ Errors: ${msg.errors}` : '';
        const details = msg.errorMessages.length > 0
          ? '\n\n' + msg.errorMessages.join('\n')
          : '';

        showStatus(successMsg + errorMsg + details, 'success');
      } else if (msg.type === 'import-error') {
        showError('Import failed: ' + msg.message);
      } else if (msg.type === 'text-layers-list') {
        showLayerList(msg.layers);
      }
    };

    function showStatus(message, type) {
      status.textContent = message;
      status.className = 'status ' + type;
    }

    function showError(message) {
      showStatus('❌ ' + message, 'error');
    }

    function showLayerList(layers) {
      if (layers.length === 0) {
        layerList.innerHTML = 'No text layers found on current page.';
      } else {
        layerList.innerHTML = layers.map(layer =>
          `<div class="layer-item">
            <strong>${layer.name}</strong><br>
            ${layer.characters}
          </div>`
        ).join('');
      }
      layerList.classList.add('show');
    }
  </script>
</body>
</html>
